<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NumberInfo API</title>
    <style>
        body {
            background: #0a0f1a;
            font-family: monospace;
            padding: 2rem;
            color: #86efac;
        }
        pre {
            background: #0f172a;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .error {
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div id="content">Loading...</div>

    <script>
        const API_BASE = "https://numberinfoapi.onrender.com/lookup";
        const API_KEY = "ak_kFQlFtduAvaDIPteuDYYJnYxamd5Tw8m";

        async function fetchData() {
            const urlParams = new URLSearchParams(window.location.search);
            let number = urlParams.get('number');
            
            if (!number) {
                document.getElementById('content').innerHTML = `
                    <h2>NumberInfo API</h2>
                    <p>Usage: ?number=9439123621</p>
                    <p>Example: <a href="?number=9439123621">?number=9439123621</a></p>
                `;
                return;
            }
            
            const apiUrl = `${API_BASE}?number=${encodeURIComponent(number)}&apikey=${API_KEY}`;
            
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                document.getElementById('content').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (err) {
                document.getElementById('content').innerHTML = `<pre class="error">Error: ${err.message}</pre>`;
            }
        }
        
        fetchData();
    </script>
</body>
</html>
