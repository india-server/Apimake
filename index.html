<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NumberInfo API</title>
</head>
<body>
    <pre id="result" style="background:#0a0f1a; color:#86efac; padding:1rem; margin:0; min-height:100vh; font-family:monospace;"></pre>

    <script>
        const API_BASE = "https://numberinfoapi.onrender.com/lookup";
        const API_KEY = "ak_kFQlFtduAvaDIPteuDYYJnYxamd5Tw8m";

        const urlParams = new URLSearchParams(window.location.search);
        const number = urlParams.get('number');

        if (!number) {
            document.getElementById('result').innerHTML = JSON.stringify({ error: "Number required", usage: "?number=9439123621" }, null, 2);
        } else {
            fetch(`${API_BASE}?number=${encodeURIComponent(number)}&apikey=${API_KEY}`)
                .then(res => res.json())
                .then(data => document.getElementById('result').innerHTML = JSON.stringify(data, null, 2))
                .catch(err => document.getElementById('result').innerHTML = JSON.stringify({ error: err.message }, null, 2));
        }
    </script>
</body>
</html>
